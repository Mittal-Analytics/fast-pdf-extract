name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Upload the built wheel to PyPI'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  linux-wheel:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Build Linux wheel
        run: |
          docker run --rm --platform linux/amd64 \
            -v "${{ github.workspace }}:/io" \
            -w /io \
            ghcr.io/astral-sh/uv:python3.13-bookworm \
            bash -lc '
              apt-get update &&
              apt-get install -y --no-install-recommends \
                build-essential ca-certificates clang curl \
                libfontconfig1-dev llvm patchelf pkg-config &&
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --profile minimal &&
              . "$HOME/.cargo/env" &&
              uvx --from "maturin>=1.8,<2.0" maturin build \
                --release \
                --interpreter python3.13 \
                --compatibility manylinux_2_36 \
                --auditwheel repair \
                --out dist \
                --target-dir /tmp/fast-pdf-extract-target
            '

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-wheel
          path: dist/*.whl

      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.publish }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
