name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Upload the built wheel to PyPI'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  linux-wheel:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    container:
      image: ghcr.io/astral-sh/uv:python3.13-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            clang \
            curl \
            libfontconfig1-dev \
            llvm \
            patchelf \
            pkg-config

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build Linux wheel
        run: |
          uvx --from 'maturin>=1.8,<2.0' maturin build \
            --release \
            --interpreter python3.13 \
            --compatibility manylinux_2_36 \
            --auditwheel repair \
            --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-wheel
          path: dist/*.whl

      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.publish }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
