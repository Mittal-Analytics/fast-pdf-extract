name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install system dependencies
        run: sudo apt update && sudo apt install -y clang libfontconfig1-dev llvm pkg-config

      - name: Install uv
        run: python -m pip install uv

      - name: Run checks
        run: |
          cargo check
          uv lock --check
          uv run python -m unittest \
            tests.tests.TestCases.test_bad_file \
            tests.tests.TestCases.test_page_count_bank_of_maharashtra \
            tests.tests.TestCases.test_empty_pages_bank_of_maharashtra \
            tests.tests.TestCases.test_fontconfig_error_pdf
